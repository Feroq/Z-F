<html lang="tr">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{

overflow-x:hidden;
}
canvas{
position:fixed;
inset:0;
z-index:-1;
}
.glass{
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
border-radius:30px;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}
#login{
height:100vh;
display:flex;
justify-content:center;

}
#site{display:none;padding:30px;}

padding:14px;
border:none;
border-radius:20px;
width:220px;
text-align:center;
margin-top:15px;
}
button{
padding:12px 25px;
border:none;
border-radius:30px;
margin-top:20px;
cursor:pointer;
}
.heart{
font-size:70px;
animation:pulse 1.5s infinite;
}
@keyframes pulse{
50%{transform:scale(1.15);}
}
.slider{
display:flex;
gap:20px;
overflow-x:auto;
padding:30px 10px;
scroll-snap-type:x mandatory;
}
.slider::-webkit-scrollbar{display:none;}
.card{
min-width:250px;
scroll-snap-align:center;
}
.card img{
width:250px;
height:330px;
object-fit:cover;
border-radius:25px;
cursor:pointer;
}
.card p{
margin-top:12px;
font-size:15px;
color:#ddd;
}
#popup{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
justify-content:center;
align-items:center;
z-index:999;
}
#popup img{
max-width:90%;
max-height:90%;
border-radius:20px;
}
#letter{
display:none;
max-width:700px;
margin:30px auto;

}
</style>
</head>
